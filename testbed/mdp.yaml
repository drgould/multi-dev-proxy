# Export selected generated env vars to a .env file at the project root so
# outside-of-mdp tools (IDE, shell, psql, curl) can consume them.
global:
  env_file: ./.mdp.env
  env:
    # Mapping form — pass through another service's env var or port as-is.
    API_PORT:
      ref: api-main.env.PORT
    DB_PORT:
      ref: db-main.env.DB_PORT
    # Scalar form — any string with ${svc.key} or ${svc.env.VAR} refs.
    API_URL: "http://localhost:${api-main.PORT}"
    DB_URL:  "postgres://localhost:${db-main.env.DB_PORT}/app"

services:
  # === main branch (TLS frontend + Docker API + proxy-less fake DB) ===
  web-main:
    command: ./server/server
    proxy: 3000
    group: main
    scheme: https
    tls_cert: .certs/localhost.pem
    tls_key: .certs/localhost-key.pem
    depends_on:
      - api-main
    # Per-service export — contains exactly what web-main's process sees.
    env_file: ./.mdp.web-main.env
    env:
      NAME: "web / main"
      COLOR: "#0f2027,#203a43,#2c5364"
      API_URL: "http://localhost:${api-main.PORT}"
      DB_URL: "postgres://localhost:${db-main.DB_PORT}/app"
      TLS_CERT: .certs/localhost.pem
      TLS_KEY: .certs/localhost-key.pem

  # Fake DB: demonstrates a non-HTTP port declared without a proxy.
  # DB_PORT gets an allocated free port for ${db-main.DB_PORT} interpolation
  # (see web-main's DB_URL), but no proxy listener is registered.
  db-main:
    command: sh -c 'echo "fake-db listening on $DB_PORT"; exec tail -f /dev/null'
    group: main
    env:
      DB_PORT: auto
    ports:
      - env: DB_PORT

  api-main:
    command: docker compose up --build
    dir: ./docker
    proxy: 3001
    group: main
    # Give each docker-compose container its own colored lane in mdp's output
    # instead of bundling them all under "api-main".
    log_split: compose
    env:
      PORT: auto
      NAME: "api / main"
      COLOR: "#1a0a2e,#3d1659,#6b21a8"
      MODE: api
    ports:
      - env: PORT
        proxy: 3001
        name: api-main

  # === feature-a branch ===
  web-feature-a:
    command: ./server/server
    proxy: 3000
    group: feature-a
    env:
      NAME: "web / feature-a"
      COLOR: "#0a2e1a,#16593d,#21a86b"
      API_URL: "http://localhost:3001"

  api-feature-a:
    setup:
      - sh -c 'echo "[setup] preparing api-feature-a"; sleep 1'
    command: ./server/server
    shutdown:
      - sh -c 'echo "[shutdown] cleaning up api-feature-a"'
    proxy: 3001
    group: feature-a
    env:
      NAME: "api / feature-a"
      COLOR: "#2e2a0a,#595216,#a89c21"
      MODE: api

  # === feature-b branch ===
  web-feature-b:
    command: ./server/server
    proxy: 3000
    group: feature-b
    env:
      NAME: "web / feature-b"
      COLOR: "#2e0a0a,#591616,#a82121"
      API_URL: "http://localhost:3001"

  api-feature-b:
    command: ./server/server
    proxy: 3001
    group: feature-b
    env:
      NAME: "api / feature-b"
      COLOR: "#0a1a2e,#163d59,#216ba8"
      MODE: api

port_range: "10000-60000"
