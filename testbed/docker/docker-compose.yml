services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: testbed
      POSTGRES_USER: testbed
      POSTGRES_PASSWORD: testbed
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testbed"]
      interval: 2s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://testbed:testbed@db:5432/testbed

  nginx:
    image: nginx:alpine
    depends_on:
      - api
    ports:
      - "${NGINX_PORT:-8090}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/html:/usr/share/nginx/html
