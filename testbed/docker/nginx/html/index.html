<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Docker — nginx + GraphQL + Postgres</title>
</head>
<body style="margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#042f2e,#0d5c5c,#0f766e);color:#ccfbf1;min-height:100vh;display:flex;align-items:center;justify-content:center">
<div style="max-width:650px;width:100%;padding:2rem">
  <h1 style="font-size:2.5rem;margin:0 0 0.5rem;color:#5eead4">Docker — nginx + GraphQL + Postgres</h1>
  <div style="background:rgba(255,255,255,0.08);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem">
    <p><strong>Stack:</strong> nginx &rarr; FastAPI + Strawberry GraphQL &rarr; PostgreSQL</p>
    <p><strong>Port:</strong> <span id="port"></span></p>
    <p><strong>Time:</strong> <span id="clock"></span></p>
  </div>

  <div style="background:rgba(255,255,255,0.08);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <h2 style="margin:0;font-size:1.1rem;color:#99f6e4">Books</h2>
      <div style="display:flex;gap:0.5rem">
        <input id="search" type="text" placeholder="Search..." style="padding:0.4rem 0.7rem;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#ccfbf1;font-size:0.85rem;width:140px">
        <button onclick="loadBooks()" style="padding:0.4rem 0.8rem;border-radius:6px;border:none;background:#14b8a6;color:#042f2e;cursor:pointer;font-weight:600;font-size:0.85rem">Refresh</button>
      </div>
    </div>
    <div id="books" style="min-height:2rem"><p style="opacity:0.5">Loading...</p></div>
  </div>

  <div style="background:rgba(255,255,255,0.08);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem">
    <h2 style="margin:0 0 1rem;font-size:1.1rem;color:#99f6e4">Add Book</h2>
    <div style="display:flex;flex-direction:column;gap:0.5rem">
      <input id="title" type="text" placeholder="Title" style="padding:0.5rem;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#ccfbf1">
      <input id="author" type="text" placeholder="Author" style="padding:0.5rem;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#ccfbf1">
      <input id="year" type="number" placeholder="Year" style="padding:0.5rem;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#ccfbf1">
      <button onclick="addBook()" style="padding:0.5rem;border-radius:6px;border:none;background:#14b8a6;color:#042f2e;cursor:pointer;font-weight:600">Add</button>
    </div>
  </div>

  <div style="background:rgba(255,255,255,0.08);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem">
    <h2 style="margin:0 0 0.75rem;font-size:1.1rem;color:#99f6e4">Raw GraphQL</h2>
    <textarea id="gql" rows="3" style="width:100%;padding:0.5rem;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#ccfbf1;font-family:'SF Mono',Menlo,monospace;font-size:0.85rem;resize:vertical">{ books { id title author year } }</textarea>
    <button onclick="runQuery()" style="margin-top:0.5rem;padding:0.4rem 0.8rem;border-radius:6px;border:none;background:#14b8a6;color:#042f2e;cursor:pointer;font-weight:600;font-size:0.85rem">Execute</button>
    <pre id="gql-out" style="background:#042f2e;padding:0.75rem;border-radius:6px;margin-top:0.5rem;font-size:0.8rem;white-space:pre-wrap;max-height:200px;overflow:auto"></pre>
  </div>

  <p style="text-align:center;color:rgba(255,255,255,0.3);font-size:0.8rem;margin-top:2rem">If mdp is working, you should see a floating switcher widget at the top of this page.</p>
</div>
<script>
document.getElementById('port').textContent = window.location.port || '80';
function tick() { document.getElementById('clock').textContent = new Date().toLocaleTimeString(); }
tick(); setInterval(tick, 1000);

async function gqlFetch(query, variables) {
  var r = await fetch('/graphql', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query: query, variables: variables || {} })
  });
  return r.json();
}

async function loadBooks() {
  var s = document.getElementById('search').value;
  var q = s
    ? '{ books(search: "' + s.replace(/"/g, '\\"') + '") { id title author year } }'
    : '{ books { id title author year } }';
  var data = await gqlFetch(q);
  var el = document.getElementById('books');
  if (!data.data || !data.data.books || data.data.books.length === 0) {
    el.innerHTML = '<p style="opacity:0.5">No books found.</p>';
    return;
  }
  el.innerHTML = data.data.books.map(function(b) {
    return '<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(255,255,255,0.04);border-radius:6px;margin-bottom:4px">' +
      '<span style="flex:1"><strong>' + esc(b.title) + '</strong> &mdash; ' + esc(b.author) + ' (' + b.year + ')</span>' +
      '<button onclick="deleteBook(' + b.id + ')" style="background:none;border:1px solid rgba(255,255,255,0.15);color:#f87171;cursor:pointer;border-radius:4px;padding:2px 8px;font-size:12px">&times;</button>' +
      '</div>';
  }).join('');
}

async function addBook() {
  var t = document.getElementById('title').value;
  var a = document.getElementById('author').value;
  var y = parseInt(document.getElementById('year').value);
  if (!t || !a || !y) return;
  await gqlFetch('mutation($i: BookInput!) { addBook(input: $i) { id } }', { i: { title: t, author: a, year: y } });
  document.getElementById('title').value = '';
  document.getElementById('author').value = '';
  document.getElementById('year').value = '';
  loadBooks();
}

async function deleteBook(id) {
  if (!confirm('Delete this book?')) return;
  await gqlFetch('mutation($id: Int!) { deleteBook(id: $id) }', { id: id });
  loadBooks();
}

async function runQuery() {
  var q = document.getElementById('gql').value;
  var out = document.getElementById('gql-out');
  try {
    var data = await gqlFetch(q);
    out.textContent = JSON.stringify(data, null, 2);
  } catch (e) {
    out.textContent = 'Error: ' + e;
  }
}

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

document.getElementById('search').addEventListener('input', loadBooks);
loadBooks();
</script>
</body>
</html>
