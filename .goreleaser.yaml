version: 2

project_name: mdp

before:
  hooks:
    - go mod tidy

builds:
  - id: mdp
    main: ./cmd/mdp
    binary: mdp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}

archives:
  - id: mdp
    builds:
      - mdp
    name_template: "mdp_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch

# Re-running the same tag (e.g. after moving the tag) leaves assets on the
# GitHub release; replace them instead of failing with 422 already_exists.
release:
  replace_existing_artifacts: true

brews:
  - name: mdp
    repository:
      owner: drgould
      name: homebrew-mdp
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/drgould/multi-dev-proxy"
    description: "Multi-dev proxy — run multiple dev servers behind one port"
    license: "GPL-3.0"
    skip_upload: auto
    install: |
      bin.install "mdp"

scoops:
  - name: mdp
    repository:
      owner: drgould
      name: scoop-mdp
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    homepage: "https://github.com/drgould/multi-dev-proxy"
    description: "Multi-dev proxy — run multiple dev servers behind one port"
    license: GPL-3.0
    skip_upload: auto
